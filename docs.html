    <script>
        const URL_MODELS      = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRR9-fSj7w0hofgshYNJ7t3O1uGrC4tG0i9bdhzxAAT2sa_-y74V6dEKrsrO7S2Uafwcxz4-GSxORve/pub?output=csv';
        const URL_WIKI        = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ-8i3BkYL-uBDqICAYWNbEiRmxJRztXQmlcN2r4NSZFUb3kmQb6tcdcZRcDRHjUONvlcqNHz1cMFKI/pub?output=csv'; // 待建立知識百科 Google Sheet 後填入 published CSV 網址
        const URL_COMPARISONS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ42IpI7XqI3KkLaprtqIaeK91mj7JvkXrXfyGmDStnNkrCvmDCFoYufGYbBoyoivklC0VhZRfMmU5O/pub?output=csv';

        let allModelsData = [];
        let allWikiData = [];
        let allComparisonsData = [];
        let currentWikiCatFilter = 'ALL';
        let currentTab = 'models';
        let currentTypeFilter = 'ALL';
        let currentCategoryFilter = 'ALL';
        let currentCompanyFilter = 'ALL';
        let selectedModalities = new Set();
        let currentSearchTerm = '';
        let currentSort = 'date-desc';
        const MODELS_PER_PAGE = 9;
        const WIKI_PER_PAGE   = 12;
        const COMPS_PER_PAGE  = 15;
        let currentModelsPage = 1;
        let currentWikiPage   = 1;
        let currentCompsPage  = 1;

        function fetchCSV(url) {
            return new Promise((resolve, reject) => {
                Papa.parse(url, {
                    download: true, header: true, skipEmptyLines: true,
                    complete: results => resolve(results.data),
                    error: err => reject(err)
                });
            });
        }

        async function initData() {
            try {
                const [modelsResult, wikiResult, comparisonsResult] = await Promise.allSettled([
                    fetchCSV(URL_MODELS),
                    URL_WIKI ? fetchCSV(URL_WIKI) : Promise.resolve([]),
                    fetchCSV(URL_COMPARISONS)
                ]);

                const rawModels   = modelsResult.status      === 'fulfilled' ? modelsResult.value      : [];
                allWikiData       = wikiResult.status        === 'fulfilled' ? wikiResult.value        : [];
                allComparisonsData = comparisonsResult.status === 'fulfilled' ? comparisonsResult.value : [];

                allModelsData = rawModels.filter(r => r['record_type'] === 'model' || !r['record_type']);

                // 移除 loading 提示
                ['loadingText', 'loadingWiki', 'loadingComparisons'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.remove();
                });

                // 動態生成公司過濾按鈕
                const companies = [...new Set(allModelsData.map(m => m['company']).filter(Boolean))].sort();
                const companyBtnsContainer = document.getElementById('companyFilterBtns');
                companies.forEach(company => {

                document.querySelectorAll('.cat-filter-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const isActive = e.target.classList.contains('bg-orange-500');
                        const isAll = e.target.dataset.filterCat === 'ALL';
                        const target = (isActive && !isAll)
                            ? document.querySelector('.cat-filter-btn[data-filter-cat="ALL"]')
                            : e.target;
                        document.querySelectorAll('.cat-filter-btn').forEach(b => {

                            b.classList.add('bg-white', 'text-gray-600');

                document.querySelectorAll('.mod-filter-btn').forEach(btn => {

                            selectedModalities.delete(mod);

        // ===== Tab 3: 相似名詞比較 =====

        function parseItemsDetails(text) {
            const lines = text.split('\n').filter(l => l.trim() !== '');
            const sections = [];
            const keys = [];
            let current = null;

            lines.forEach(line => {
                if (line.startsWith('【')) {
                    current = { name: line.trim(), items: {} };
                    sections.push(current);
                } else {
                    const idx = line.indexOf('：');
                    if (idx > -1 && current) {
                        const k = line.slice(0, idx).trim();
                        const v = line.slice(idx + 1).trim();
                        current.items[k] = v;
                        if (!keys.includes(k)) keys.push(k);
                    }
                }
            });
            return { sections, keys };
        }

        const KEY_ICONS = {
            '是什麼': `<svg class="w-3.5 h-3.5 text-gray-500 inline mr-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke-width="2"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 16v-4m0-4h.01"/></svg>`,
            '優勢':   `<svg class="w-3.5 h-3.5 text-green-500 inline mr-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>`,
            '劣勢':   `<svg class="w-3.5 h-3.5 text-red-400 inline mr-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`,
            '適合':   `<svg class="w-3.5 h-3.5 text-red-600 inline mr-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>`,
        };

        function buildVSColumns(sections, keys) {
            if (!sections.length || !keys.length) return '';

            const palette = [
                { header: 'bg-blue-700',  label: 'text-blue-700',  border: 'border-blue-200',  bg: 'bg-white' },
                { header: 'bg-slate-700', label: 'text-slate-700', border: 'border-slate-200', bg: 'bg-white' },
                { header: 'bg-orange-500',  label: 'text-blue-700',  border: 'border-blue-200',  bg: 'bg-white' },
                { header: 'bg-slate-600', label: 'text-slate-600', border: 'border-slate-200', bg: 'bg-white' },
            ];

            const cols = sections.map((s, i) => {
                const c = palette[i % palette.length];
                const rows = keys.map(key => {
                    const icon = KEY_ICONS[key] || '';
                    return `
                    <div>
                        <p class="text-xs font-bold ${c.label} mb-1 flex items-center">${icon}${key}</p>
                        <p class="text-sm text-gray-700 leading-relaxed">${s.items[key] || '—'}</p>
                    </div>`;
                }).join('');
                return `
                    <div class="rounded-xl border-2 ${c.border} ${c.bg} overflow-hidden shadow-sm">
                        <div class="${c.header} text-white px-4 py-2.5 text-sm font-bold">${s.name}</div>
                        <div class="p-4 space-y-4">${rows}</div>
                    </div>`;
            }).join('');

            const gridCols = sections.length >= 3 ? 'grid-cols-1 sm:grid-cols-3'
                           : sections.length === 2 ? 'grid-cols-1 sm:grid-cols-2'
                           : 'grid-cols-1';
            return `<div class="grid ${gridCols} gap-4 mt-4">${cols}</div>`;
        }

        function formatCompTitle(title) {
            // Split on " vs " (case-insensitive), highlight each noun term
            const parts = title.split(/(\s+vs\s+)/i);
            return parts.map(part => {
                if (/^\s+vs\s+$/i.test(part)) {
                    return `<span class="text-gray-400 font-normal text-sm">${part.trim()}</span>`;
                }
                return `<span class="bg-slate-100 text-slate-800 px-1.5 py-0.5 rounded font-extrabold">${part}</span>`;
            }).join(' ');
        }

        function renderComparisons(resetPage = true) {
            if (resetPage) currentCompsPage = 1;
            const container = document.getElementById('comparisonsContainer');
            container.innerHTML = '';

            let filtered = allComparisonsData.filter(c => {
                const searchStr = `${c['title']} ${c['summary']} ${c['key_difference']}`.toLowerCase();
                return searchStr.includes(currentSearchTerm);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 py-10 text-lg">找不到符合條件的比較 🥲</div>`;
                renderDocsPagination('compsPagination', 0, 0, 0, COMPS_PER_PAGE, 'goToCompsPage');
                return;
            }

            const totalCompsItems = filtered.length;
            const totalCompsPages = Math.ceil(totalCompsItems / COMPS_PER_PAGE);
            if (currentCompsPage > totalCompsPages) currentCompsPage = Math.max(1, totalCompsPages);
            const pageComps = filtered.slice((currentCompsPage - 1) * COMPS_PER_PAGE, currentCompsPage * COMPS_PER_PAGE);

            pageComps.forEach(comp => {
                let tableHtml = '';
                if (comp['items_details']) {
                    const { sections, keys } = parseItemsDetails(comp['items_details']);
                    tableHtml = buildVSColumns(sections, keys);
                }

                const keyDiffHtml = comp['key_difference'] ? `
                    <div class="mt-4 px-4 py-3 bg-amber-50 rounded-lg border border-amber-200">
                        <p class="text-xs font-bold text-amber-700 mb-1">🔑 核心差異</p>
                        <p class="text-sm text-amber-900 leading-relaxed">${comp['key_difference']}</p>
                    </div>` : '';

                const financeHtml = comp['financial_use_case'] ? `
                    <div class="mt-3 px-4 py-3 bg-blue-50 rounded-lg border border-blue-100">
                        <p class="text-xs font-bold text-blue-700 mb-1">🏦 金融業應用情境</p>
                        <p class="text-sm text-blue-900 leading-relaxed">${comp['financial_use_case']}</p>
                    </div>` : '';

                const uid = Math.random().toString(36).slice(2);
                container.innerHTML += `
                    <article class="border-b border-gray-200 last:border-b-0">
                        <button onclick="toggleComp('${uid}')"
                            class="w-full text-left py-5 flex items-start justify-between gap-3 group">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 flex-wrap">
                                    <h3 class="text-base sm:text-lg font-bold text-gray-900 leading-snug flex items-center gap-1.5 flex-wrap">${formatCompTitle(comp['title'])}</h3>
                                    <span class="bg-orange-100 text-orange-800 text-xs font-bold px-2 py-0.5 rounded flex-shrink-0">比較</span>
                                </div>
                                <p class="text-sm text-gray-500 mt-1 leading-relaxed">${comp['summary'] || ''}</p>
                            </div>
                            <svg id="chevron-${uid}" class="flex-shrink-0 w-5 h-5 text-gray-400 transition-transform duration-200 mt-0.5"
                                fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>
                        <div id="body-${uid}" class="hidden pb-5">
                            ${tableHtml}
                            ${keyDiffHtml}
                            ${financeHtml}
                        </div>
                    </article>
                `;
            });

            renderDocsPagination('compsPagination', currentCompsPage, totalCompsPages, totalCompsItems, COMPS_PER_PAGE, 'goToCompsPage');
        }


        function renderDocsPagination(containerId, page, totalPages, totalItems, perPage, goFnName) {
            const el = document.getElementById(containerId);
            if (!el) return;
            if (totalPages <= 1) { el.innerHTML = ''; return; }
            const startItem = (page - 1) * perPage + 1;
            const endItem = Math.min(page * perPage, totalItems);
            let pages = '';
            let s = Math.max(1, page - 2), e = Math.min(totalPages, s + 4);
            if (e - s < 4) s = Math.max(1, e - 4);
            for (let i = s; i <= e; i++) {
                const a = i === page;
                pages += `<button onclick="${goFnName}(${i})" class="w-8 h-8 rounded-lg text-sm font-semibold transition ${a ? 'bg-blue-600 text-white shadow-sm' : 'bg-white text-gray-600 border border-gray-300 hover:bg-blue-50'}">${i}</button>`;
            }
            el.innerHTML = `<div class="flex items-center justify-center gap-2 py-6">
                <button onclick="${goFnName}(${page - 1})" ${page === 1 ? 'disabled' : ''} class="px-3 py-1.5 rounded-lg text-sm font-semibold border border-gray-300 bg-white hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">← 上一頁</button>
                <div class="flex gap-1">${pages}</div>
                <button onclick="${goFnName}(${page + 1})" ${page === totalPages ? 'disabled' : ''} class="px-3 py-1.5 rounded-lg text-sm font-semibold border border-gray-300 bg-white hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">下一頁 →</button>
                <span class="text-xs text-gray-400 ml-2">${startItem}–${endItem} / ${totalItems} 筆</span>
            </div>`;
        }

        function goToModelsPage(page) { currentModelsPage = page; renderModels(false); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function goToWikiPage(page)   { currentWikiPage   = page; renderWiki(false);   window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function goToCompsPage(page)  { currentCompsPage  = page; renderComparisons(false); window.scrollTo({ top: 0, behavior: 'smooth' }); }

        function toggleComp(uid) {
            const body = document.getElementById('body-' + uid);
            const chevron = document.getElementById('chevron-' + uid);
            const isHidden = body.classList.toggle('hidden');
            chevron.style.transform = isHidden ? '' : 'rotate(180deg)';
        }

        // 綁定 Tab 按鈕
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        // 綁定手機版漢堡選單開關
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        });

        window.addEventListener('DOMContentLoaded', initData);
    </script>
</body>
</html>
